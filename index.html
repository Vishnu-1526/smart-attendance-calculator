<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            border-bottom: 3px solid #f0f0f0;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: #4CAF50;
            color: white;
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .subject-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .subject-card:hover {
            transform: translateY(-5px);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subject-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .attendance-percentage {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .safe { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .danger { background: #f8d7da; color: #721c24; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .safe .progress-fill { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .warning .progress-fill { background: linear-gradient(90deg, #FF9800, #FFC107); }
        .danger .progress-fill { background: linear-gradient(90deg, #F44336, #E91E63); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #4CAF50;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #4CAF50;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px 0;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .predictions {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: 600;
        }

        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #000;
        }

        @media (max-width: 768px) {
            .subjects-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Smart Attendance Calculator</h1>
            <p>Track, Predict & Maintain Your Academic Attendance</p>
        </div>
        
        <div class="main-content">
            <div class="tabs">
                <button class="tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
                <button class="tab" onclick="showTab('subjects')">📖 Subjects</button>
                <button class="tab" onclick="showTab('predictions')">🔮 Predictions</button>
                <button class="tab" onclick="showTab('analytics')">📈 Analytics</button>
                <button class="tab" onclick="showTab('profile')">👤 Profile</button>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="overallAttendance">0%</div>
                        <div class="stat-label">Overall Attendance</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalSubjects">0</div>
                        <div class="stat-label">Total Subjects</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="safeSubjects">0</div>
                        <div class="stat-label">Safe Subjects</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="riskSubjects">0</div>
                        <div class="stat-label">At Risk Subjects</div>
                    </div>
                </div>

                <div class="subjects-grid" id="subjectsOverview"></div>

                <div id="alertsContainer"></div>
            </div>

            <!-- Subjects Tab -->
            <div id="subjects" class="tab-content">
                <div class="form-group">
                    <button class="btn" onclick="showAddSubjectModal()">➕ Add New Subject</button>
                </div>
                <div class="subjects-grid" id="subjectsManagement"></div>
            </div>

            <!-- Predictions Tab -->
            <div id="predictions" class="tab-content">
                <h3>📊 Attendance Predictions</h3>
                <div class="predictions" id="predictionsContainer"></div>
            </div>

            <!-- Analytics Tab -->
            <div id="analytics" class="tab-content">
                <h3>📈 Attendance Analytics</h3>
                <div class="chart-container">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="profile" class="tab-content">
                <h3>👤 Student Profile</h3>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="studentName" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber" placeholder="Enter your roll number">
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <input type="text" id="course" placeholder="Enter your course">
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <select id="semester">
                        <option value="">Select Semester</option>
                        <option value="1">1st Semester</option>
                        <option value="2">2nd Semester</option>
                        <option value="3">3rd Semester</option>
                        <option value="4">4th Semester</option>
                        <option value="5">5th Semester</option>
                        <option value="6">6th Semester</option>
                        <option value="7">7th Semester</option>
                        <option value="8">8th Semester</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Minimum Attendance Required (%)</label>
                    <input type="number" id="minAttendance" value="75" min="0" max="100">
                </div>
                <button class="btn" onclick="saveProfile()">💾 Save Profile</button>
                <button class="btn btn-warning" onclick="exportData()" style="margin-left: 10px;">📤 Export Data</button>
                <button class="btn btn-danger" onclick="clearAllData()" style="margin-left: 10px;">🗑️ Clear All Data</button>
            </div>
        </div>
    </div>

    <!-- Add Subject Modal -->
    <div id="addSubjectModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addSubjectModal')">&times;</span>
            <h3>➕ Add New Subject</h3>
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="newSubjectName" placeholder="e.g., Mathematics">
            </div>
            <div class="form-group">
                <label>Subject Code</label>
                <input type="text" id="newSubjectCode" placeholder="e.g., MATH101">
            </div>
            <div class="form-group">
                <label>Total Classes Conducted</label>
                <input type="number" id="newTotalClasses" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Classes Attended</label>
                <input type="number" id="newAttendedClasses" value="0" min="0">
            </div>
            <button class="btn" onclick="addSubject()">✅ Add Subject</button>
        </div>
    </div>

    <!-- Edit Subject Modal -->
    <div id="editSubjectModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editSubjectModal')">&times;</span>
            <h3>✏️ Edit Subject</h3>
            <input type="hidden" id="editSubjectId">
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="editSubjectName">
            </div>
            <div class="form-group">
                <label>Subject Code</label>
                <input type="text" id="editSubjectCode">
            </div>
            <div class="form-group">
                <label>Total Classes Conducted</label>
                <input type="number" id="editTotalClasses" min="0">
            </div>
            <div class="form-group">
                <label>Classes Attended</label>
                <input type="number" id="editAttendedClasses" min="0">
            </div>
            <button class="btn" onclick="updateSubject()">💾 Update Subject</button>
            <button class="btn btn-danger" onclick="deleteSubject()" style="margin-left: 10px;">🗑️ Delete Subject</button>
        </div>
    </div>

    <script>
        // Data Storage
        let subjects = JSON.parse(localStorage.getItem('subjects')) || [];
        let profile = JSON.parse(localStorage.getItem('profile')) || {
            name: '',
            rollNumber: '',
            course: '',
            semester: '',
            minAttendance: 75
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
            updateDashboard();
            updateSubjectsManagement();
            updatePredictions();
            updateAnalytics();
            checkAttendanceAlerts();
        });

        // Tab Management
        function showTab(tabName) {
            // Hide all tab contents
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => content.classList.remove('active'));
            
            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            // Update analytics when analytics tab is shown
            if (tabName === 'analytics') {
                setTimeout(updateAnalytics, 100);
            }
        }

        // Profile Management
        function loadProfile() {
            document.getElementById('studentName').value = profile.name;
            document.getElementById('rollNumber').value = profile.rollNumber;
            document.getElementById('course').value = profile.course;
            document.getElementById('semester').value = profile.semester;
            document.getElementById('minAttendance').value = profile.minAttendance;
        }

        function saveProfile() {
            profile = {
                name: document.getElementById('studentName').value,
                rollNumber: document.getElementById('rollNumber').value,
                course: document.getElementById('course').value,
                semester: document.getElementById('semester').value,
                minAttendance: parseInt(document.getElementById('minAttendance').value)
            };
            localStorage.setItem('profile', JSON.stringify(profile));
            alert('✅ Profile saved successfully!');
            updateDashboard();
            checkAttendanceAlerts();
        }

        // Subject Management
        function showAddSubjectModal() {
            document.getElementById('addSubjectModal').style.display = 'block';
        }

        function addSubject() {
            const name = document.getElementById('newSubjectName').value;
            const code = document.getElementById('newSubjectCode').value;
            const totalClasses = parseInt(document.getElementById('newTotalClasses').value);
            const attendedClasses = parseInt(document.getElementById('newAttendedClasses').value);

            if (!name || !code) {
                alert('⚠️ Please fill in all required fields');
                return;
            }

            if (attendedClasses > totalClasses) {
                alert('⚠️ Attended classes cannot exceed total classes');
                return;
            }

            const subject = {
                id: Date.now(),
                name,
                code,
                totalClasses,
                attendedClasses,
                history: [{
                    date: new Date().toISOString().split('T')[0],
                    totalClasses,
                    attendedClasses
                }]
            };

            subjects.push(subject);
            saveSubjects();
            closeModal('addSubjectModal');
            clearAddSubjectForm();
            updateDashboard();
            updateSubjectsManagement();
            updatePredictions();
            updateAnalytics();
            checkAttendanceAlerts();
        }

        function editSubject(subjectId) {
            const subject = subjects.find(s => s.id === subjectId);
            if (!subject) return;

            document.getElementById('editSubjectId').value = subject.id;
            document.getElementById('editSubjectName').value = subject.name;
            document.getElementById('editSubjectCode').value = subject.code;
            document.getElementById('editTotalClasses').value = subject.totalClasses;
            document.getElementById('editAttendedClasses').value = subject.attendedClasses;
            document.getElementById('editSubjectModal').style.display = 'block';
        }

        function updateSubject() {
            const id = parseInt(document.getElementById('editSubjectId').value);
            const name = document.getElementById('editSubjectName').value;
            const code = document.getElementById('editSubjectCode').value;
            const totalClasses = parseInt(document.getElementById('editTotalClasses').value);
            const attendedClasses = parseInt(document.getElementById('editAttendedClasses').value);

            if (!name || !code) {
                alert('⚠️ Please fill in all required fields');
                return;
            }

            if (attendedClasses > totalClasses) {
                alert('⚠️ Attended classes cannot exceed total classes');
                return;
            }

            const subjectIndex = subjects.findIndex(s => s.id === id);
            if (subjectIndex !== -1) {
                subjects[subjectIndex] = {
                    ...subjects[subjectIndex],
                    name,
                    code,
                    totalClasses,
                    attendedClasses
                };
                
                // Add to history if values changed
                const lastHistory = subjects[subjectIndex].history[subjects[subjectIndex].history.length - 1];
                if (lastHistory.totalClasses !== totalClasses || lastHistory.attendedClasses !== attendedClasses) {
                    subjects[subjectIndex].history.push({
                        date: new Date().toISOString().split('T')[0],
                        totalClasses,
                        attendedClasses
                    });
                }
            }

            saveSubjects();
            closeModal('editSubjectModal');
            updateDashboard();
            updateSubjectsManagement();
            updatePredictions();
            updateAnalytics();
            checkAttendanceAlerts();
        }

        function deleteSubject() {
            const id = parseInt(document.getElementById('editSubjectId').value);
            if (confirm('🗑️ Are you sure you want to delete this subject?')) {
                subjects = subjects.filter(s => s.id !== id);
                saveSubjects();
                closeModal('editSubjectModal');
                updateDashboard();
                updateSubjectsManagement();
                updatePredictions();
                updateAnalytics();
            }
        }

        function saveSubjects() {
            localStorage.setItem('subjects', JSON.stringify(subjects));
        }

        function clearAddSubjectForm() {
            document.getElementById('newSubjectName').value = '';
            document.getElementById('newSubjectCode').value = '';
            document.getElementById('newTotalClasses').value = 0;
            document.getElementById('newAttendedClasses').value = 0;
        }

        // Modal Management
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Dashboard Updates
        function updateDashboard() {
            updateStats();
            updateSubjectsOverview();
        }

        function updateStats() {
            const totalSubjects = subjects.length;
            const overallAttendance = calculateOverallAttendance();
            const safeSubjects = subjects.filter(s => calculateAttendancePercentage(s) >= profile.minAttendance).length;
            const riskSubjects = totalSubjects - safeSubjects;

            document.getElementById('totalSubjects').textContent = totalSubjects;
            document.getElementById('overallAttendance').textContent = overallAttendance.toFixed(1) + '%';
            document.getElementById('safeSubjects').textContent = safeSubjects;
            document.getElementById('riskSubjects').textContent = riskSubjects;
        }

        function updateSubjectsOverview() {
            const container = document.getElementById('subjectsOverview');
            container.innerHTML = '';

            subjects.forEach(subject => {
                const percentage = calculateAttendancePercentage(subject);
                const status = getAttendanceStatus(percentage);
                
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div class="subject-header">
                        <div class="subject-name">${subject.name}</div>
                        <div class="attendance-percentage ${status}">${percentage.toFixed(1)}%</div>
                    </div>
                    <div class="progress-bar ${status}">
                        <div class="progress-fill" style="width: ${Math.min(percentage, 100)}%"></div>
                    </div>
                    <p><strong>Code:</strong> ${subject.code}</p>
                    <p><strong>Attended:</strong> ${subject.attendedClasses} / ${subject.totalClasses} classes</p>
                `;
                container.appendChild(card);
            });
        }

        function updateSubjectsManagement() {
            const container = document.getElementById('subjectsManagement');
            container.innerHTML = '';

            subjects.forEach(subject => {
                const percentage = calculateAttendancePercentage(subject);
                const status = getAttendanceStatus(percentage);
                
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div class="subject-header">
                        <div class="subject-name">${subject.name}</div>
                        <div class="attendance-percentage ${status}">${percentage.toFixed(1)}%</div>
                    </div>
                    <div class="progress-bar ${status}">
                        <div class="progress-fill" style="width: ${Math.min(percentage, 100)}%"></div>
                    </div>
                    <p><strong>Code:</strong> ${subject.code}</p>
                    <p><strong>Attended:</strong> ${subject.attendedClasses} / ${subject.totalClasses} classes</p>
                    <div style="margin-top: 15px;">
                        <button class="btn" onclick="editSubject(${subject.id})" style="margin-right: 10px;">✏️ Edit</button>
                        <button class="btn btn-success" onclick="markAttended(${subject.id})">✅ Mark Present</button>
                        <button class="btn btn-warning" onclick="markAbsent(${subject.id})" style="margin-left: 10px;">❌ Mark Absent</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Quick Attendance Marking
        function markAttended(subjectId) {
            const subjectIndex = subjects.findIndex(s => s.id === subjectId);
            if (subjectIndex !== -1) {
                subjects[subjectIndex].totalClasses++;
                subjects[subjectIndex].attendedClasses++;
                
                // Add to history
                subjects[subjectIndex].history.push({
                    date: new Date().toISOString().split('T')[0],
                    totalClasses: subjects[subjectIndex].totalClasses,
                    attendedClasses: subjects[subjectIndex].attendedClasses
                });
                
                saveSubjects();
                updateDashboard();
                updateSubjectsManagement();
                updatePredictions();
                updateAnalytics();
                checkAttendanceAlerts();
            }
        }

        function markAbsent(subjectId) {
            const subjectIndex = subjects.findIndex(s => s.id === subjectId);
            if (subjectIndex !== -1) {
                subjects[subjectIndex].totalClasses++;
                
                // Add to history
                subjects[subjectIndex].history.push({
                    date: new Date().toISOString().split('T')[0],
                    totalClasses: subjects[subjectIndex].totalClasses,
                    attendedClasses: subjects[subjectIndex].attendedClasses
                });
                
                saveSubjects();
                updateDashboard();
                updateSubjectsManagement();
                updatePredictions();
                updateAnalytics();
                checkAttendanceAlerts();
            }
        }

        // Predictions
        function updatePredictions() {
            const container = document.getElementById('predictionsContainer');
            container.innerHTML = '';

            subjects.forEach(subject => {
                const percentage = calculateAttendancePercentage(subject);
                const toReach75 = calculateClassesToReach75(subject);
                const canSkip = calculateCanSkip(subject);

                const predictionCard = document.createElement('div');
                predictionCard.className = 'subject-card';
                predictionCard.innerHTML = `
                    <h4>${subject.name} (${subject.code})</h4>
                    <p><strong>Current Attendance:</strong> ${percentage.toFixed(1)}%</p>
                    <div class="prediction-item">
                        <span>Classes needed to reach ${profile.minAttendance}%:</span>
                        <strong>${toReach75 >= 0 ? toReach75 : 'Already achieved!'}</strong>
                    </div>
                    <div class="prediction-item">
                        <span>Classes you can skip (staying above ${profile.minAttendance}%):</span>
                        <strong>${canSkip >= 0 ? canSkip : 'None - Below threshold'}</strong>
                    </div>
                `;
                container.appendChild(predictionCard);
            });
        }

        // Analytics
        let attendanceChart, trendChart;

        function updateAnalytics() {
            updateAttendanceChart();
            updateTrendChart();
        }

        function updateAttendanceChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            
            if (attendanceChart) {
                attendanceChart.destroy();
            }

            const data = {
                labels: subjects.map(s => s.name),
                datasets: [{
                    label: 'Attendance Percentage',
                    data: subjects.map(s => calculateAttendancePercentage(s)),
                    backgroundColor: subjects.map(s => {
                        const percentage = calculateAttendancePercentage(s);
                        if (percentage >= profile.minAttendance) return '#4CAF50';
                        if (percentage >= profile.minAttendance - 5) return '#FF9800';
                        return '#F44336';
                    }),
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            };

            attendanceChart = new Chart(ctx, {
                type: 'bar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Subject-wise Attendance Overview'
                        },
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChart) {
                trendChart.destroy();
            }

            if (subjects.length === 0) return;

            // Get all unique dates from history
            const allDates = [...new Set(subjects.flatMap(s => s.history.map(h => h.date)))].sort();
            
            const datasets = subjects.map((subject, index) => {
                const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'];
                return {
                    label: subject.name,
                    data: allDates.map(date => {
                        const historyEntry = subject.history.find(h => h.date === date);
                        if (historyEntry) {
                            return historyEntry.totalClasses > 0 ? 
                                (historyEntry.attendedClasses / historyEntry.totalClasses * 100) : 0;
                        }
                        return null;
                    }),
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length] + '20',
                    fill: false,
                    tension: 0.1
                };
            });

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Attendance Trend Over Time'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    },
                    elements: {
                        point: {
                            radius: 4
                        }
                    }
                }
            });
        }

        // Alerts and Notifications
        function checkAttendanceAlerts() {
            const alertsContainer = document.getElementById('alertsContainer');
            alertsContainer.innerHTML = '';

            const lowAttendanceSubjects = subjects.filter(s => {
                const percentage = calculateAttendancePercentage(s);
                return percentage < profile.minAttendance;
            });

            const criticalSubjects = subjects.filter(s => {
                const percentage = calculateAttendancePercentage(s);
                return percentage < profile.minAttendance - 10;
            });

            if (criticalSubjects.length > 0) {
                const alert = document.createElement('div');
                alert.className = 'alert alert-danger';
                alert.innerHTML = `
                    <strong>🚨 Critical Alert!</strong> 
                    ${criticalSubjects.length} subject(s) have very low attendance: 
                    ${criticalSubjects.map(s => s.name).join(', ')}
                `;
                alertsContainer.appendChild(alert);
            } else if (lowAttendanceSubjects.length > 0) {
                const alert = document.createElement('div');
                alert.className = 'alert alert-warning';
                alert.innerHTML = `
                    <strong>⚠️ Warning!</strong> 
                    ${lowAttendanceSubjects.length} subject(s) below ${profile.minAttendance}% attendance: 
                    ${lowAttendanceSubjects.map(s => s.name).join(', ')}
                `;
                alertsContainer.appendChild(alert);
            } else if (subjects.length > 0) {
                const alert = document.createElement('div');
                alert.className = 'alert alert-success';
                alert.innerHTML = `
                    <strong>✅ Great Job!</strong> 
                    All subjects maintain adequate attendance levels!
                `;
                alertsContainer.appendChild(alert);
            }
        }

        // Utility Functions
        function calculateAttendancePercentage(subject) {
            return subject.totalClasses > 0 ? (subject.attendedClasses / subject.totalClasses) * 100 : 0;
        }

        function calculateOverallAttendance() {
            if (subjects.length === 0) return 0;
            const totalClasses = subjects.reduce((sum, s) => sum + s.totalClasses, 0);
            const totalAttended = subjects.reduce((sum, s) => sum + s.attendedClasses, 0);
            return totalClasses > 0 ? (totalAttended / totalClasses) * 100 : 0;
        }

        function getAttendanceStatus(percentage) {
            if (percentage >= profile.minAttendance) return 'safe';
            if (percentage >= profile.minAttendance - 5) return 'warning';
            return 'danger';
        }

        function calculateClassesToReach75(subject) {
            const targetPercentage = profile.minAttendance / 100;
            const currentAttended = subject.attendedClasses;
            const currentTotal = subject.totalClasses;
            
            // Formula: (attended + x) / (total + x) = target
            // Solving: x = (target * total - attended) / (1 - target)
            const classesNeeded = Math.ceil((targetPercentage * currentTotal - currentAttended) / (1 - targetPercentage));
            
            return Math.max(0, classesNeeded);
        }

        function calculateCanSkip(subject) {
            const targetPercentage = profile.minAttendance / 100;
            const currentAttended = subject.attendedClasses;
            const currentTotal = subject.totalClasses;
            
            if (currentTotal === 0) return 0;
            
            // Formula: attended / (total + x) = target
            // Solving: x = (attended / target) - total
            const maxTotal = Math.floor(currentAttended / targetPercentage);
            const canSkip = maxTotal - currentTotal;
            
            return Math.max(0, canSkip);
        }

        // Data Management
        function exportData() {
            const data = {
                profile: profile,
                subjects: subjects,
                exportDate: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `attendance_data_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function clearAllData() {
            if (confirm('🗑️ Are you sure you want to clear all data? This action cannot be undone!')) {
                if (confirm('⚠️ This will delete all subjects and profile data. Are you absolutely sure?')) {
                    localStorage.clear();
                    subjects = [];
                    profile = {
                        name: '',
                        rollNumber: '',
                        course: '',
                        semester: '',
                        minAttendance: 75
                    };
                    loadProfile();
                    updateDashboard();
                    updateSubjectsManagement();
                    updatePredictions();
                    updateAnalytics();
                    alert('✅ All data cleared successfully!');
                }
            }
        }

        // Event Listeners
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modals = document.querySelectorAll('.modal');
                modals.forEach(modal => modal.style.display = 'none');
            }
        });

        // Validation for form inputs
        document.getElementById('newAttendedClasses').addEventListener('input', function() {
            const total = parseInt(document.getElementById('newTotalClasses').value);
            const attended = parseInt(this.value);
            if (attended > total) {
                this.setCustomValidity('Attended classes cannot exceed total classes');
            } else {
                this.setCustomValidity('');
            }
        });

        document.getElementById('editAttendedClasses').addEventListener('input', function() {
            const total = parseInt(document.getElementById('editTotalClasses').value);
            const attended = parseInt(this.value);
            if (attended > total) {
                this.setCustomValidity('Attended classes cannot exceed total classes');
            } else {
                this.setCustomValidity('');
            }
        });

        // Auto-save profile on input change
        document.querySelectorAll('#profile input, #profile select').forEach(input => {
            input.addEventListener('change', function() {
                // Auto-save profile data
                profile = {
                    name: document.getElementById('studentName').value,
                    rollNumber: document.getElementById('rollNumber').value,
                    course: document.getElementById('course').value,
                    semester: document.getElementById('semester').value,
                    minAttendance: parseInt(document.getElementById('minAttendance').value) || 75
                };
                localStorage.setItem('profile', JSON.stringify(profile));
                updateDashboard();
                checkAttendanceAlerts();
            });
        });

        // Periodic alerts (every 5 minutes)
        setInterval(function() {
            const now = new Date();
            const lastAlert = localStorage.getItem('lastAlert');
            
            if (!lastAlert || (now - new Date(lastAlert)) > 5 * 60 * 1000) {
                const criticalSubjects = subjects.filter(s => {
                    const percentage = calculateAttendancePercentage(s);
                    return percentage < profile.minAttendance - 10;
                });
                
                if (criticalSubjects.length > 0 && 'Notification' in window) {
                    Notification.requestPermission().then(function(permission) {
                        if (permission === 'granted') {
                            new Notification('📚 Attendance Alert', {
                                body: `${criticalSubjects.length} subject(s) have critical attendance levels!`,
                                icon: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0OCIgaGVpZ2h0PSI0OCIgdmlld0JveD0iMCAwIDQ4IDQ4Ij48cGF0aCBkPSJNMjQgNEMxMi45NSA0IDQgMTIuOTUgNCAyNHM4Ljk1IDIwIDIwIDIwIDIwLTguOTUgMjAtMjBTMzUuMDUgNCAyNCA0em0tNCAyOGgtNHYtNGg0djR6bTAtOGgtNFYxMmg0djEyeiIgZmlsbD0iI0Y0NDMzNiIvPjwvc3ZnPg=='
                            });
                        }
                    });
                    localStorage.setItem('lastAlert', now.toISOString());
                }
            }
        }, 5 * 60 * 1000);

        // Initialize notifications permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
